# =============================================================================
# Prometheus Configuration — Visoora Telemetry Scraping
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/visoora_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Visoora FastAPI backend — /metrics endpoint
  - job_name: "visoora-telephony"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - "call-orchestrator:8000"
          - "audio-processor:8000"
    # In Kubernetes, use kubernetes_sd_configs instead:
    # kubernetes_sd_configs:
    #   - role: pod
    #     selectors:
    #       - role: pod
    #         label: "app=visoora"

  # Node exporter for host-level metrics (optional)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
