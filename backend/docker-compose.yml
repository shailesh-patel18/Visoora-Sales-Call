version: '3.8'

services:
  # ----------------------------------------------------
  # Shared Cache & State Store (Redis Cluster / Instance)
  # ----------------------------------------------------
  redis:
    image: redis:7.0-alpine
    container_name: visoora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - visoora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------
  # API Gateway & Sticky Load Balancer (Nginx Proxy)
  # ----------------------------------------------------
  api-gateway:
    image: nginx:1.25-alpine
    container_name: visoora-gateway
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - call-orchestrator
      - audio-processor
    networks:
      - visoora-network

  # ----------------------------------------------------
  # Service 1: Call Orchestrator (HTTP Webhooks & API)
  # ----------------------------------------------------
  call-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visoora-orchestrator
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-your_twilio_auth_token_here}
      - TWILIO_TRIAL_NUMBER=${TWILIO_TRIAL_NUMBER:-+15017122661}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SERVICE_TYPE=orchestrator
      - POD_ID=orchestrator-pod
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - visoora-network

  # ----------------------------------------------------
  # Service 2: Audio Processor (WebSockets & Real-Time Audio)
  # ----------------------------------------------------
  audio-processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visoora-processor
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-your_twilio_auth_token_here}
      - SERVICE_TYPE=audio-processor
      - POD_ID=audio-processor-pod
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - visoora-network

  # ----------------------------------------------------
  # Service 3: Recording Worker (Asynchronous Post-processing)
  # ----------------------------------------------------
  recording-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visoora-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SERVICE_TYPE=worker
      - POD_ID=worker-pod
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - visoora-network

volumes:
  redis_data:

networks:
  visoora-network:
    name: visoora-network
