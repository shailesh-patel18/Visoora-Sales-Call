version: "3.8"

services:
  redis:
    image: redis:7.2-alpine
    container_name: visoora-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visoora-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: 8000
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      REDIS_URL: redis://redis:6379/0
      SERVER_PUBLIC_DOMAIN: ${SERVER_PUBLIC_DOMAIN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-your_twilio_auth_token_here}
      TWILIO_TRIAL_NUMBER: ${TWILIO_TRIAL_NUMBER:-+15017122661}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SYSTEM_API_KEYS: ${SYSTEM_API_KEYS:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - recordings_data:/app/recordings

volumes:
  redis_data:
  recordings_data:
