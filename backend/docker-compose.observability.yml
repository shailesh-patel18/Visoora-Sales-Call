# =============================================================================
# Visoora Observability Stack — Docker Compose Overlay
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.observability.yml up
# =============================================================================

version: '3.8'

services:
  # ──────────────────────────────────────────────────
  # Prometheus — Metrics collection & alerting engine
  # ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: visoora-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alertmanager-rules.yml:/etc/prometheus/visoora_alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - visoora-network

  # ──────────────────────────────────────────────────
  # AlertManager — Alert routing to PagerDuty / Slack
  # ──────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: visoora-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager-config.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - visoora-network

  # ──────────────────────────────────────────────────
  # Grafana — Dashboards & visualization
  # ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: visoora-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-dashboard.json:/var/lib/grafana/dashboards/visoora-ops.json:ro
      - ./observability/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - visoora-network

  # ──────────────────────────────────────────────────
  # Grafana Tempo — Distributed tracing backend
  # ──────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.1
    container_name: visoora-tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo query API
    command:
      - '-config.file=/etc/tempo/tempo.yml'
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - visoora-network

  # ──────────────────────────────────────────────────
  # Grafana Loki — Log aggregation
  # ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: visoora-loki
    ports:
      - "3100:3100"
    command:
      - '-config.file=/etc/loki/local-config.yaml'
    volumes:
      - loki_data:/loki
    networks:
      - visoora-network

  # ──────────────────────────────────────────────────
  # Promtail — Scrapes container logs → Loki
  # ──────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: visoora-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
    command:
      - '-config.file=/etc/promtail/config.yml'
    depends_on:
      - loki
    networks:
      - visoora-network

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:

networks:
  visoora-network:
    external: true
    name: visoora-network
