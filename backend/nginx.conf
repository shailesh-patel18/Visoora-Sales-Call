events {
    worker_connections 1024;
}

http {
    upstream orchestrator_backend {
        server call-orchestrator:8000;
    }

    upstream audio_processor_backend {
        server audio-processor:8000;
    }

    server {
        listen 80;

        # 1. Route standard HTTP traffic (webhooks, dashboard logs, compliance) to Orchestrator
        location / {
            proxy_pass http://orchestrator_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Route heavy real-time WebSockets to Audio Processor with sticky affinity support
        location /media-stream {
            proxy_pass http://audio_processor_backend;
            proxy_http_version 1.1;
            
            # WebSocket headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for persistent media streams
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
